name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
  schedule:
    - cron: "0 0 * * 0"

env:
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  BuildJob:
    name: Build per OS
    strategy:
        matrix:
            os: [ "ubuntu-latest", "windows-latest", "macos-latest" ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2 # immutable action, safe to use the versions
      - run: cargo build --all-features --all-targets --verbose
  Build:
    name: Wait for build jobs to finish
    needs: BuildJob
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build jobs succeeded"
  Format:
    name: Check Rust code formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2 # immutable action, safe to use the versions
      - run: cargo fmt --all --check --verbose
  Clippy:
    name: Check Rust code with Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2 # immutable action, safe to use the versions
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: false
          cache-all-crates: true
      - run: cargo install-tools
      - run: cargo clippy --all-features --all-targets --verbose -- --deny warnings
      - run: cargo clippy --all-features --all-targets --quiet --message-format=json | cargo-action-fmt
        if: failure()
  TestJob:
    name: Test per OS
    strategy:
      matrix:
        os: [ "ubuntu-latest", "windows-latest", "macos-latest" ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2 # immutable action, safe to use the versions
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: false
          cache-all-crates: true
      - run: cargo install-tools
      - name: Run tests
        run: cargo llvm-cov nextest --all-features --all-targets --no-fail-fast --no-tests=pass --verbose
      - name: Prepare coverage report
        if: ${{ !cancelled() }}
        run: cargo llvm-cov report --lcov --output-path coverage.lcov
      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          report_type: test_results
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  Tests:
    name: Wait for testing jobs to finish
    needs: TestJob
    runs-on: ubuntu-latest
    steps:
      - run: echo "Testing jobs succeeded"
  Deps:
    name: Check dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2 # immutable action, safe to use the versions
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: false
          cache-all-crates: true
      - run: cargo install-tools
      - name: Machete
        run: cargo machete
      - name: Deny
        run: cargo deny check all
  PublishCrateJob:
    name: Test publishing per crate
    strategy:
      matrix:
        crate: [ "project" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2 # immutable action, safe to use the versions
      - name: Dry run publish
        run: cargo publish --all-features --package ${{ matrix.crate }} --dry-run --verbose
      - name: Create package
        run: cargo package --all-features --package ${{ matrix.crate }} --verbose
      - uses: actions/upload-artifact@v7.0.1 # immutable action, safe to use the versions
        with:
          name: ${{ matrix.crate }}-crate
          path: target/package/${{ matrix.crate }}-*.crate
  Publish:
    name: Wait for publishing jobs to finish
    needs: PublishCrateJob
    runs-on: ubuntu-latest
    steps:
      - run: echo "Publishing Passed"
